let view='ms', filter=null;

function stMeta(s){return s==='done'?{k:'done',l:'완료'}:s==='prog'?{k:'prog',l:'진행중'}:s==='cancel'?{k:'cancel',l:'취소'}:{k:'todo',l:'예정'};}
function parseD(s){const m=(s||'').match(/(\d{1,2})\/(\d{1,2})/);return m?new Date(YEAR,+m[1]-1,+m[2]):null;}
function sortKey(s){const m=(s||'').match(/(\d{1,2})\/(\d{1,2})/);return m?(+m[1])*100+(+m[2]):9999;}
function dday(s,done){const dl=parseD(s);if(!dl||done)return null;const diff=Math.round((dl-TODAY)/86400000);if(diff<0)return{cls:'over',t:'지남 '+(-diff)+'일'};if(diff===0)return{cls:'dday',t:'D-day'};if(diff<=4)return{cls:'near',t:'D-'+diff};return{cls:'',t:'D-'+diff};}
function whoCol(p){return COL[p]||'#6b7280';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function taskHTML(person,title,date,st,showWho,weekLabel){
  const m=stMeta(st), dd=dday(date,m.k==='done'||m.k==='cancel');
  let meta='';
  if(showWho&&person) meta+=`<span class="who" style="background:${whoCol(person)}">${person}</span>`;
  if(weekLabel) meta+=`<span class="who" style="background:#efece5;color:#8a8276">${weekLabel}</span>`;
  if(date) meta+=`<span class="dl">${date}</span>`;
  if(dd) meta+=`<span class="dday ${dd.cls}">${dd.t}</span>`;
  return `<div class="task ${m.k}"><div class="dot ${m.k}"></div><div class="tmain"><div class="tname">${esc(title)}</div>`+
    (meta?`<div class="tmeta">${meta}</div>`:'')+`</div><span class="stbadge st-${m.k}">${m.l}</span></div>`;
}

function computeSummary(list){
  let done=0,prog=0,todo=0,cancel=0;
  list.forEach(t=>{const k=stMeta(t.s).k;k==='done'?done++:k==='prog'?prog++:k==='cancel'?cancel++:todo++;});
  return {n:list.length,done,prog,todo,cancel};
}

function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===view));
  // 필터칩은 주간/담당자 뷰에서만
  const fbox=document.getElementById('filters'), hint=document.getElementById('hint');
  if(view==='ms'){ fbox.innerHTML=''; hint.textContent=''; }
  else{
    const counts={}; WK.forEach(w=>{if(w[1]!=='팀')counts[w[1]]=(counts[w[1]]||0)+1;});
    let fh=`<span class="fchip ${filter?'':'on'}" onclick="setFilter(null)">전체</span>`;
    PEOPLE.forEach(p=>{const on=filter===p;fh+=`<span class="fchip ${on?'on':''}" onclick="setFilter('${p}')" style="${on?'background:'+whoCol(p)+';border-color:'+whoCol(p):''}">${p}<span class="c">${counts[p]||0}</span></span>`;});
    fbox.innerHTML=fh;
    hint.textContent = view==='wk'?'주차를 눌러 접기/펼치기 · 담당자 칩으로 필터':'담당자 칩을 눌러 한 명만 보기';
  }
  // summary
  let sumList;
  if(view==='ms') sumList=MS.map(m=>({s:m[3]}));
  else sumList=WK.filter(w=>w[1]!=='팀'&&(!filter||w[1]===filter)).map(w=>({s:w[4]}));
  const s=computeSummary(sumList);
  document.getElementById('summary').innerHTML=
    `<div class="sm"><div class="n">${s.n}</div><div class="l">전체</div></div>`+
    `<div class="sm done"><div class="n">${s.done}</div><div class="l">완료</div></div>`+
    `<div class="sm prog"><div class="n">${s.prog}</div><div class="l">진행중</div></div>`+
    `<div class="sm todo"><div class="n">${s.todo}</div><div class="l">예정</div></div>`+
    (s.cancel?`<div class="sm cancel"><div class="n">${s.cancel}</div><div class="l">취소</div></div>`:'');

  const board=document.getElementById('board');
  if(view==='ms') board.innerHTML=renderMS();
  else if(view==='wk') board.innerHTML=renderWK();
  else board.innerHTML=renderPP();
}

function renderMS(){
  let html='';
  MSCATS.forEach(cat=>{
    const items=MS.filter(m=>m[0]===cat).sort((a,b)=>sortKey(a[2])-sortKey(b[2]));
    if(!items.length)return;
    html+=`<div class="mscat">${cat}</div>`;
    items.forEach(m=>{ html+=taskHTML('마일스톤',m[1],m[2],m[3],false,null); });
  });
  return html;
}

function renderWK(){
  let html='';
  WEEKS.forEach((wl,i)=>{
    let items=WK.filter(w=>w[0]===i);
    if(filter) items=items.filter(w=>w[1]===filter);
    if(!items.length) return;
    const open = i>=NOWWEEK && i<=NOWWEEK+2;
    const note=WEEKNOTE[i]?`<span class="tag"> · ${WEEKNOTE[i]}</span>`:'';
    html+=`<div class="wkhdr ${i===NOWWEEK?'now':''}" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">`+
      `<div class="wt">${wl}${note}</div><div class="wc">${items.length}건 ${open?'▾':'▸'}</div></div>`+
      `<div class="wkbody" style="display:${open?'block':'none'}">`;
    // 담당자별 소그룹
    const order=['팀',...PEOPLE];
    order.forEach(p=>{
      const pit=items.filter(w=>w[1]===p);
      if(!pit.length)return;
      html+=`<div class="pgrp"><span class="ph" style="background:${whoCol(p)}">${p}</span></div>`;
      pit.forEach(w=>{ html+=taskHTML(p,w[2],w[3],w[4],false,null); });
    });
    html+='</div>';
  });
  return html||'<div class="empty">표시할 항목이 없습니다.</div>';
}

function renderPP(){
  const persons = filter?[filter]:PEOPLE;
  let html='';
  persons.forEach(p=>{
    const items=WK.filter(w=>w[1]===p).sort((a,b)=>(a[0]-b[0])||(sortKey(a[3])-sortKey(b[3])));
    if(!items.length)return;
    html+=`<div class="g1" style="color:${whoCol(p)}">${p} <span style="font-weight:600;color:#aaa;font-size:11px">${items.length}건</span></div>`;
    let curW=-1;
    items.forEach(w=>{
      if(w[0]!==curW){curW=w[0];html+=`<div class="mscat">${WEEKS[w[0]]}${WEEKNOTE[w[0]]?' · '+WEEKNOTE[w[0]]:''}</div>`;}
      html+=taskHTML(p,w[2],w[3],w[4],false,null);
    });
  });
  return html||'<div class="empty">표시할 항목이 없습니다.</div>';
}

function setView(v){view=v;render();window.scrollTo(0,0);}
function setFilter(p){filter=p;render();}
render();
