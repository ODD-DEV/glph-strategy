<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GLPH 워크플랜 (실시간)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f4f3f0;color:#1a1a1a;padding:0 0 60px;}
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  header{position:sticky;top:0;background:#f4f3f0;z-index:10;padding:14px 16px 10px;border-bottom:1px solid #e5e2db;}
  .htop{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  h1{font-size:19px;font-weight:800;letter-spacing:-0.5px;}
  .sync{font-size:11px;color:#999;}
  .sync b{color:#C9A24B;}
  .refresh{font-size:11px;border:1px solid #d8d4cc;background:#fff;border-radius:100px;padding:5px 12px;cursor:pointer;color:#555;}
  .livebtn{display:inline-flex;align-items:center;gap:7px;border:1px solid #d8d4cc;background:#fff;border-radius:100px;padding:7px 13px;cursor:pointer;font-size:12px;font-weight:700;color:#555;}
  .livebtn .ldot{width:9px;height:9px;border-radius:50%;background:#bbb;flex-shrink:0;}
  .livebtn .ltime{font-weight:500;color:#999;font-size:11px;}
  .livebtn.live{border-color:#bfe6cd;background:#f1faf4;color:#2e9457;}
  .livebtn.live .ldot{background:#3a9d5d;animation:pulse 1.8s infinite;}
  .livebtn.sync{border-color:#f0e2c0;background:#fdf8ec;color:#b8860b;}
  .livebtn.sync .ldot{background:#d98a2b;}
  .livebtn.err{border-color:#f3c4c4;background:#fdeeee;color:#c0392b;}
  .livebtn.err .ldot{background:#d23b3b;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,157,93,.55);}70%{box-shadow:0 0 0 7px rgba(58,157,93,0);}100%{box-shadow:0 0 0 0 rgba(58,157,93,0);}}
  .summary{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .sm{flex:1;min-width:70px;background:#fff;border:1px solid #eae6df;border-radius:10px;padding:9px 10px;text-align:center;}
  .sm .n{font-size:20px;font-weight:800;}
  .sm .l{font-size:10.5px;color:#999;margin-top:2px;}
  .sm.done .n{color:#3a9d5d;} .sm.prog .n{color:#d98a2b;} .sm.todo .n{color:#9aa0a8;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .fchip{font-size:12px;border:1px solid #d8d4cc;background:#fff;border-radius:100px;padding:6px 11px;cursor:pointer;color:#555;user-select:none;}
  .fchip.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
  .fchip .c{opacity:.6;font-size:10px;margin-left:3px;}

  .g1{font-size:13px;font-weight:800;color:#1a1a1a;margin:22px 4px 6px;letter-spacing:-0.3px;display:flex;align-items:center;gap:7px;}
  .g1::before{content:'';width:6px;height:16px;background:#C9A24B;border-radius:2px;}
  .g2{font-size:12px;font-weight:700;color:#8a8276;margin:14px 6px 6px;}
  .task{background:#fff;border:1px solid #eae6df;border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:#cfcabf;}
  .dot.done{background:#3a9d5d;} .dot.prog{background:#d98a2b;}
  .tmain{flex:1;min-width:0;}
  .tname{font-size:14px;font-weight:600;letter-spacing:-0.2px;}
  .task.done .tname{color:#9aa0a8;text-decoration:line-through;}
  .tmeta{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap;}
  .who{font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px;color:#fff;}
  .who.sub{background:#cfcabf!important;font-weight:600;}
  .dl{font-size:11px;color:#888;}
  .dday{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:100px;background:#f0ede6;color:#777;}
  .dday.over{background:#fbe4e4;color:#d23b3b;} .dday.near{background:#fff2cc;color:#b8860b;}
  .stbadge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:100px;flex-shrink:0;}
  .st-done{background:#e3f4ea;color:#3a9d5d;} .st-prog{background:#fbeedd;color:#d98a2b;} .st-todo{background:#eee;color:#9aa0a8;} .st-etc{background:#eef;color:#5566aa;}

  .arch{margin-top:30px;border-top:1px solid #e5e2db;padding-top:14px;}
  .arch summary{font-size:13px;font-weight:700;color:#8a8276;cursor:pointer;list-style:none;}
  .arch summary::-webkit-details-marker{display:none;}
  .arch summary::before{content:'▸ ';color:#C9A24B;}
  .arch[open] summary::before{content:'▾ ';}
  .arch .ai{font-size:12.5px;color:#9aa0a8;padding:8px 10px;border-bottom:1px solid #f0ede6;text-decoration:line-through;}
  .loading{text-align:center;color:#aaa;font-size:13px;padding:40px;}
  .err{background:#fbe4e4;color:#c0392b;font-size:12px;padding:10px 12px;border-radius:8px;margin:10px 0;line-height:1.6;}
  .note{font-size:11px;color:#aaa;text-align:center;margin-top:24px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0;">
    <div class="htop">
      <h1>GLPH 워크플랜</h1>
      <button class="livebtn sync" id="livebtn" onclick="load()" title="클릭하면 즉시 새로고침">
        <span class="ldot"></span><span id="lstate">연결 중…</span><span class="ltime" id="ltime"></span>
      </button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="filters" id="filters"></div>
  </div>
</header>

<div class="wrap">
  <div id="board"><div class="loading">구글 시트에서 불러오는 중…</div></div>

  <details class="arch">
    <summary>기존 완료 기록 (이전 워크플랜)</summary>
    <div id="archive"><div class="ai" style="text-decoration:none;color:#bbb;">불러오는 중…</div></div>
  </details>

  <div class="note">
    구글 시트 실시간 미러 · 읽기 전용 · 20초마다 자동 갱신<br>
    수정은 <b>구글 시트</b>에서 하세요. 상태는 시트의 '진행상태' 열 기준입니다.
  </div>
</div>

<script>
const SHEET_ID='1I0bB9Zxg4hNahKanznvmygJ4mKzxlzzb_GaExV-riK0';
const API_KEY='AIzaSyC-0iUj6v4BBrmGNVSlEWYWiiWvdJkbHlY';
const RANGE="'Work Plan'!A1:H200";
const GIST_ID='4f6732d0d2f6bfacbd6074db9338a307';
const YEAR=2026;
const PEOPLE_COLORS={'창석':'#3b6fb0','동현':'#0f9d8c','민호':'#b8632b','상민':'#7a52c4','수아':'#c44d8a','종필':'#5a8f3a','종필님':'#5a8f3a','외주':'#888'};
const EXT=['웰파인','상상바이오','노바렉스'];
let activeFilter=null;
let allTasks=[];
let lastSync=0;

function setStatus(state){
  const b=document.getElementById('livebtn'), s=document.getElementById('lstate');
  b.className='livebtn '+state;
  s.textContent = state==='live'?'LIVE':state==='sync'?'동기화 중':'연결 끊김';
}
function fmtAgo(){
  const el=document.getElementById('ltime');
  if(!lastSync){el.textContent='';return;}
  const sec=Math.round((Date.now()-lastSync)/1000);
  el.textContent='· '+(sec<5?'방금':sec<60?sec+'초 전':Math.floor(sec/60)+'분 전');
}

function whoColor(n){ return PEOPLE_COLORS[n] || (EXT.includes(n)?'#a9a195':'#6b7280'); }
function parseDeadline(s){
  if(!s) return null;
  const m=s.match(/(\d{1,2})\/(\d{1,2})/);
  if(!m) return null;
  return new Date(YEAR, +m[1]-1, +m[2]);
}
function ddayInfo(dl, done){
  if(!dl||done) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((dl-today)/86400000);
  let cls='', txt;
  if(diff<0){cls='over';txt='지남 '+(-diff)+'일';}
  else if(diff===0){cls='near';txt='D-day';}
  else if(diff<=3){cls='near';txt='D-'+diff;}
  else{txt='D-'+diff;}
  return {cls,txt};
}
function statusOf(h){
  const t=(h||'').trim();
  if(!t) return {key:'todo',label:'예정'};
  if(t.includes('완료')) return {key:'done',label:'완료'};
  if(t.includes('진행')) return {key:'prog',label:'진행중'};
  return {key:'etc',label:t};
}

async function load(){
  if(!lastSync) setStatus('sync');
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok) throw new Error('Sheets API '+r.status);
    const d=await r.json();
    const rows=d.values||[];
    parseRows(rows);
    render();
    lastSync=Date.now();
    setStatus('live'); fmtAgo();
  }catch(e){
    setStatus('err');
    document.getElementById('ltime').textContent='· 확인 필요';
    if(!allTasks.length){
      document.getElementById('board').innerHTML='<div class="err">시트를 불러오지 못했습니다: '+e.message+'<br>시트가 \"링크 공개\"인지, API 키 리퍼러 제한이 이 주소를 허용하는지 확인하세요.</div>';
    }
  }
}

function parseRows(rows){
  allTasks=[];
  let g1='',g2='';
  for(let i=4;i<rows.length;i++){
    const r=rows[i]||[];
    const B=(r[1]||'').trim(), C=(r[2]||'').trim(), D=(r[3]||'').trim();
    const E=(r[4]||'').trim(), F=(r[5]||'').trim(), G=(r[6]||'').trim(), H=(r[7]||'').trim();
    if(D==='분류 3') continue;
    if(B && !D){ g1=B; g2=''; continue; }
    if(C && !D){ g2=C; continue; }
    if(!D) continue;
    allTasks.push({g1,g2,name:D,main:E,sub:F,dl:G,status:H});
  }
}

function render(){
  const tasks=allTasks;
  // summary
  let done=0,prog=0,todo=0;
  tasks.forEach(t=>{const s=statusOf(t.status).key; if(s==='done')done++; else if(s==='prog')prog++; else todo++;});
  document.getElementById('summary').innerHTML=
    `<div class="sm"><div class="n">${tasks.length}</div><div class="l">전체</div></div>`+
    `<div class="sm done"><div class="n">${done}</div><div class="l">완료</div></div>`+
    `<div class="sm prog"><div class="n">${prog}</div><div class="l">진행중</div></div>`+
    `<div class="sm todo"><div class="n">${todo}</div><div class="l">예정</div></div>`;
  // filters (담당자)
  const counts={};
  tasks.forEach(t=>{ if(t.main){counts[t.main]=(counts[t.main]||0)+1;} });
  const people=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  let fh=`<span class="fchip ${activeFilter?'':'on'}" onclick="setFilter(null)">전체</span>`;
  people.forEach(p=>{ fh+=`<span class="fchip ${activeFilter===p?'on':''}" onclick="setFilter('${p.replace(/'/g,"")}')" style="${activeFilter===p?'background:'+whoColor(p)+';border-color:'+whoColor(p):''}">${p}<span class="c">${counts[p]}</span></span>`; });
  document.getElementById('filters').innerHTML=fh;
  // board
  const shown=activeFilter? tasks.filter(t=>t.main===activeFilter||t.sub===activeFilter) : tasks;
  let html='', curG1='', curG2='';
  if(!shown.length){ html='<div class="loading">표시할 과업이 없습니다.</div>'; }
  shown.forEach(t=>{
    if(t.g1!==curG1){ curG1=t.g1; curG2=''; html+=`<div class="g1">${t.g1||'기타'}</div>`; }
    if(t.g2!==curG2){ curG2=t.g2; if(t.g2) html+=`<div class="g2">${t.g2}</div>`; }
    const st=statusOf(t.status);
    const isDone=st.key==='done';
    const dd=ddayInfo(parseDeadline(t.dl), isDone);
    let who='';
    if(t.main) who+=`<span class="who" style="background:${whoColor(t.main)}">${t.main}</span>`;
    if(t.sub) who+=`<span class="who sub">${t.sub}</span>`;
    html+=`<div class="task ${isDone?'done':''}">`+
      `<div class="dot ${st.key}"></div>`+
      `<div class="tmain"><div class="tname">${t.name}</div>`+
      `<div class="tmeta">${who}${t.dl?`<span class="dl">${t.dl}</span>`:''}${dd?`<span class="dday ${dd.cls}">${dd.txt}</span>`:''}</div></div>`+
      `<span class="stbadge st-${st.key}">${st.label}</span>`+
      `</div>`;
  });
  document.getElementById('board').innerHTML=html;
}

function setFilter(p){ activeFilter=p; render(); }

// 기존 Gist 완료 항목 (1회 로드, 읽기전용 아카이브)
async function loadArchive(){
  try{
    const r=await fetch('https://api.github.com/gists/'+GIST_ID);
    if(!r.ok) throw 0;
    const g=await r.json();
    const f=g.files['workplan.json']; if(!f) throw 0;
    const data=JSON.parse(f.content);
    const tasks=Array.isArray(data)?data:(data.tasks||[]);
    const done=tasks.filter(t=>t.done);
    document.getElementById('archive').innerHTML = done.length
      ? done.map(t=>`<div class="ai">${(t.t||t.title||t.n||'').replace(/</g,'&lt;')}</div>`).join('')
      : '<div class="ai" style="text-decoration:none;color:#bbb;">완료 기록 없음</div>';
  }catch(e){
    document.getElementById('archive').innerHTML='<div class="ai" style="text-decoration:none;color:#bbb;">기존 기록을 불러오지 못했습니다</div>';
  }
}

load();
loadArchive();
setInterval(load, 20000);
// 1초마다 경과시간 갱신 + 60초 이상 갱신 없으면 '끊김'으로 표시
setInterval(()=>{
  fmtAgo();
  if(lastSync && Date.now()-lastSync>60000){ setStatus('err'); document.getElementById('ltime').textContent='· '+Math.floor((Date.now()-lastSync)/1000)+'초 지연'; }
}, 1000);
// 탭으로 돌아오면 즉시 갱신
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) load(); });
</script>
</body>
</html>
